<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criterio Ventas</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Criterio" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>body { margin: 0; background: #0A0A0F; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const INITIAL_VENDEDORAS = [
  { id: 1, nombre: "Luli", comision: 3, color: "#C4785A" },
  { id: 2, nombre: "Meli", comision: 5, color: "#10B981" },
  { id: 3, nombre: "Otra", comision: 4, color: "#6366F1" },
];

const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function fmtPeso(n) {
  return "$" + Number(n || 0).toLocaleString("es-AR", { minimumFractionDigits: 0 });
}

function getMonthKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}

function App() {
  const [tab, setTab] = useState("dashboard");
  const [ventas, setVentas] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cv_ventas") || "[]"); } catch { return []; }
  });
  const [vendedoras, setVendedoras] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cv_vendedoras") || "null") || INITIAL_VENDEDORAS; } catch { return INITIAL_VENDEDORAS; }
  });
  const [clientes, setClientes] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cv_clientes") || "{}"); } catch { return {}; }
  });
  const [pagos, setPagos] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cv_pagos") || "[]"); } catch { return []; }
  });

  useEffect(() => { localStorage.setItem("cv_ventas", JSON.stringify(ventas)); }, [ventas]);
  useEffect(() => { localStorage.setItem("cv_vendedoras", JSON.stringify(vendedoras)); }, [vendedoras]);
  useEffect(() => { localStorage.setItem("cv_clientes", JSON.stringify(clientes)); }, [clientes]);
  useEffect(() => { localStorage.setItem("cv_pagos", JSON.stringify(pagos)); }, [pagos]);

  const addVenta = (venta) => {
    const newVenta = { ...venta, id: Date.now(), fecha: venta.fecha || new Date().toISOString().split("T")[0] };
    setVentas(v => [newVenta, ...v]);
    if (venta.cliente && venta.vendedoraId) {
      setClientes(c => ({ ...c, [venta.cliente.toLowerCase().trim()]: venta.vendedoraId }));
    }
  };

  const addPago = (vendedoraId, monto, mes) => {
    setPagos(p => [...p, { id: Date.now(), vendedoraId, monto: Number(monto), mes, fecha: new Date().toISOString().split("T")[0] }]);
  };

  const getVendedora = (id) => vendedoras.find(v => v.id === id);

  const getComisionMes = (vendedoraId, mesKey) => {
    const v = getVendedora(vendedoraId);
    if (!v) return 0;
    const totalVentas = ventas
      .filter(vt => vt.vendedoraId === vendedoraId && getMonthKey(vt.fecha) === mesKey)
      .reduce((s, vt) => s + Number(vt.total || 0), 0);
    return totalVentas * v.comision / 100;
  };

  const getPagadoMes = (vendedoraId, mesKey) => {
    return pagos
      .filter(p => p.vendedoraId === vendedoraId && p.mes === mesKey)
      .reduce((s, p) => s + p.monto, 0);
  };

  const currentMes = getMonthKey(new Date());

  return (
    <div style={{ minHeight: "100vh", background: "#F5EDE8", color: "#3D2B24", fontFamily: "'DM Sans', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .tab-btn { background: none; border: none; cursor: pointer; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.2s; }
        .tab-btn.active { color: #F59E0B; border-bottom: 2px solid #F59E0B; }
        .tab-btn:not(.active) { color: #666; }
        .tab-btn:hover:not(.active) { color: #999; }
        .card { background: #13131A; border: 1px solid #1E1E2E; border-radius: 12px; padding: 20px; }
        .btn { border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: #F59E0B; color: #0A0A0F; padding: 10px 20px; font-size: 14px; }
        .btn-primary:hover { background: #FBBF24; transform: translateY(-1px); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .input { background: #1A1A25; border: 1px solid #2A2A3E; border-radius: 8px; color: #F0EDE8; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; outline: none; transition: border 0.2s; }
        .input:focus { border-color: #F59E0B; }
        select.input option { background: #1A1A25; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        @media (max-width: 640px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
        .stat-card { background: #13131A; border: 1px solid #1E1E2E; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #F59E0B; animation: pulse 1s infinite; margin: 0 3px; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>

      {/* Header */}
      <div style={{ borderBottom: "1px solid #1E1E2E", padding: "0 24px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 0 0" }}>
            <div>
              <span style={{ fontFamily: "'Playfair Display', serif", fontSize: 22, fontWeight: 900, color: "#C4785A", letterSpacing: "-0.02em" }}>CRITERIO</span>
              <span style={{ fontSize: 11, color: "#9A7570", marginLeft: 10, letterSpacing: "0.15em", textTransform: "uppercase" }}>Ventas</span>
            </div>
            <div style={{ fontSize: 12, color: "#9A7570" }}>{new Date().toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" })}</div>
          </div>
          <div style={{ display: "flex", gap: 4, marginTop: 8, overflowX: "auto" }}>
            {[["dashboard","Dashboard"],["nueva","Nueva Venta"],["comisiones","Comisiones"],["historial","Historial"],["config","Config"]].map(([k,l]) => (
              <button key={k} className={`tab-btn ${tab===k?"active":""}`} onClick={() => setTab(k)}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 24px" }} className="fade-in">
        {tab === "dashboard" && <Dashboard ventas={ventas} vendedoras={vendedoras} pagos={pagos} currentMes={currentMes} getComisionMes={getComisionMes} getPagadoMes={getPagadoMes} fmtPeso={fmtPeso} MESES={MESES} getMonthKey={getMonthKey} />}
        {tab === "nueva" && <NuevaVenta vendedoras={vendedoras} clientes={clientes} addVenta={addVenta} fmtPeso={fmtPeso} />}
        {tab === "comisiones" && <Comisiones ventas={ventas} vendedoras={vendedoras} pagos={pagos} addPago={addPago} currentMes={currentMes} getComisionMes={getComisionMes} getPagadoMes={getPagadoMes} fmtPeso={fmtPeso} MESES={MESES} getMonthKey={getMonthKey} />}
        {tab === "historial" && <Historial ventas={ventas} vendedoras={vendedoras} fmtPeso={fmtPeso} MESES={MESES} getMonthKey={getMonthKey} />}
        {tab === "config" && <Config vendedoras={vendedoras} setVendedoras={setVendedoras} clientes={clientes} setClientes={setClientes} ventas={ventas} setVentas={setVentas} setPagos={setPagos} pagos={pagos} />}
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({ ventas, vendedoras, pagos, currentMes, getComisionMes, getPagadoMes, fmtPeso, MESES, getMonthKey }) {
  const mesActual = ventas.filter(v => getMonthKey(v.fecha) === currentMes);
  const totalMes = mesActual.reduce((s, v) => s + Number(v.total || 0), 0);

  const [yr, mo] = currentMes.split("-").map(Number);
  const ultimos6 = Array.from({ length: 6 }, (_, i) => {
    let m = mo - i; let y = yr;
    if (m < 1) { m += 12; y -= 1; }
    const key = `${y}-${String(m).padStart(2, "0")}`;
    const total = ventas.filter(v => getMonthKey(v.fecha) === key).reduce((s, v) => s + Number(v.total || 0), 0);
    return { label: MESES[m - 1], total, key };
  }).reverse();

  const maxTotal = Math.max(...ultimos6.map(m => m.total), 1);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div className="grid3">
        <StatCard label="Ventas este mes" value={fmtPeso(totalMes)} accent="#C4785A" sub={`${mesActual.length} operaciones`} />
        <StatCard label="Cantidad ventas" value={mesActual.length} accent="#10B981" sub="mes actual" />
        <StatCard label="Ticket promedio" value={fmtPeso(mesActual.length ? totalMes / mesActual.length : 0)} accent="#6366F1" sub="mes actual" />
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>Evolución últimos 6 meses</p>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 12, height: 100 }}>
          {ultimos6.map((m, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 10, color: "#9A7570" }}>{fmtPeso(m.total).slice(0, 9)}</span>
              <div style={{ width: "100%", height: `${Math.max((m.total / maxTotal) * 80, 4)}px`, background: m.key === currentMes ? "#C4785A" : "#D4B5A8", borderRadius: 4, transition: "height 0.5s ease" }} />
              <span style={{ fontSize: 11, color: m.key === currentMes ? "#C4785A" : "#8B6560", fontWeight: m.key === currentMes ? 700 : 400 }}>{m.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Vendedoras — mes actual</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {vendedoras.map(v => {
            const tventa = mesActual.filter(vt => vt.vendedoraId === v.id).reduce((s, vt) => s + Number(vt.total || 0), 0);
            const comision = getComisionMes(v.id, currentMes);
            const pagado = getPagadoMes(v.id, currentMes);
            const deuda = comision - pagado;
            return (
              <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "12px 0", borderBottom: "1px solid #1E1E2E" }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: v.color + "22", border: `2px solid ${v.color}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: v.color }}>{v.nombre[0]}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ fontWeight: 600, fontSize: 14 }}>{v.nombre} <span style={{ fontSize: 11, color: "#8B6560" }}>({v.comision}%)</span></p>
                  <p style={{ fontSize: 12, color: "#7A5550", marginTop: 2 }}>{fmtPeso(tventa)} en ventas</p>
                </div>
                <div style={{ textAlign: "right" }}>
                  <p style={{ fontSize: 13, fontWeight: 700, color: deuda > 0 ? "#F87171" : "#10B981" }}>{fmtPeso(Math.abs(deuda))}</p>
                  <p style={{ fontSize: 10, color: "#8B6560" }}>{deuda > 0 ? "a pagar" : "al día"}</p>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, accent, sub }) {
  return (
    <div className="stat-card" style={{ borderTop: `2px solid ${accent}` }}>
      <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10 }}>{label}</p>
      <p style={{ fontSize: 26, fontWeight: 700, color: "#3D2B24" }}>{value}</p>
      {sub && <p style={{ fontSize: 12, color: "#9A7570", marginTop: 4 }}>{sub}</p>}
    </div>
  );
}

// ─── NUEVA VENTA ─────────────────────────────────────────────────────────────
const PROMPT_EXTRACCION = `Analizá este presupuesto/comprobante de venta de ropa. Extraé los siguientes datos y respondé SOLO con un JSON válido sin backticks ni texto extra:
{
  "cliente": "nombre del cliente o null",
  "fecha": "fecha en formato YYYY-MM-DD o null",
  "total": número total de la venta como número (sin descuento aplicado si hay uno separado) o null,
  "totalConDescuento": número total final después del descuento o null,
  "items": [{"descripcion": "...", "cantidad": N, "precio": N, "total": N}],
  "descuento": número de descuento aplicado o null,
  "notas": "cualquier nota relevante o null"
}
Si no podés leer algún campo, poné null.`;

async function extraerDatosFotoBase64(base64, mediaType) {
  const apiKey = localStorage.getItem("cv_apikey") || "";
  if (!apiKey) throw new Error("Falta la API key de Gemini. Andá a Config y agregala.");
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: mediaType, data: base64 } },
        { text: PROMPT_EXTRACCION }
      ]}],
      generationConfig: { temperature: 0.1 }
    })
  });
  let data;
  try { data = await resp.json(); } catch(e) { throw new Error("HTTP " + resp.status); }
  if (!resp.ok || data.error) {
    throw new Error("API " + resp.status + ": " + (data.error?.message || JSON.stringify(data).slice(0, 120)));
  }
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  if (!text) throw new Error("Respuesta vacía. Revisá la API key.");
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("Sin JSON en respuesta: " + text.slice(0, 80));
  try { return JSON.parse(match[0]); }
  catch(e) { throw new Error("JSON inválido: " + match[0].slice(0, 80)); }
}

function ItemsDetectados({ extracted, fmtPeso }) {
  const [expanded, setExpanded] = React.useState(false);
  const items = extracted.items || [];
  const visible = expanded ? items : items.slice(0, 3);
  return (
    <div style={{ background: "#FDF5F2", borderRadius: 8, padding: 10 }}>
      <p style={{ fontSize: 10, color: "#C4785A", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>✓ Detectado</p>
      {visible.map((it, i) => (
        <p key={i} style={{ fontSize: 11, color: "#AAA", marginBottom: 2 }}>{it.cantidad}x {it.descripcion} — {fmtPeso(it.total)}</p>
      ))}
      {items.length > 3 && (
        <button onClick={() => setExpanded(e => !e)} style={{ background: "none", border: "none", color: "#C4785A", cursor: "pointer", fontSize: 11, padding: "4px 0", textDecoration: "underline" }}>
          {expanded ? "Ver menos ▲" : `+${items.length - 3} más... Ver todos ▼`}
        </button>
      )}
      {extracted.descuento && <p style={{ fontSize: 11, color: "#F87171", marginTop: 4 }}>Descuento: -{fmtPeso(extracted.descuento)}</p>}
      <p style={{ fontSize: 13, fontWeight: 700, color: "#C4785A", marginTop: 4 }}>Total: {fmtPeso(extracted.totalConDescuento ?? extracted.total)}</p>
    </div>
  );
}

function NuevaVenta({ vendedoras, clientes, addVenta, fmtPeso }) {
  const fileRef = useRef();
  const fileRefMulti = useRef();

  const [queue, setQueue] = useState([]);
  const [activeIdx, setActiveIdx] = useState(null);
  const [savedCount, setSavedCount] = useState(0);
  const processingRef = useRef(false);

  const defaultForm = () => ({
    cliente: "", vendedoraId: "", total: "",
    fecha: new Date().toISOString().split("T")[0], nota: ""
  });

  const buildForm = (extracted, prevForm) => {
    const clienteLower = (extracted?.cliente || "").toLowerCase().trim();
    const vendedoraIdAuto = clientes[clienteLower] || "";
    const totalFinal = extracted?.totalConDescuento ?? extracted?.total ?? "";
    return {
      cliente: extracted?.cliente || prevForm?.cliente || "",
      vendedoraId: vendedoraIdAuto ? String(vendedoraIdAuto) : (prevForm?.vendedoraId || ""),
      total: totalFinal !== null && totalFinal !== undefined && totalFinal !== "" ? totalFinal : (prevForm?.total || ""),
      fecha: extracted?.fecha || prevForm?.fecha || new Date().toISOString().split("T")[0],
      nota: prevForm?.nota || "",
    };
  };

  // Leer archivos como dataUrl (base64) — funciona en todos los entornos
  const addFiles = async (files) => {
    const arr = Array.from(files);
    const newItems = await Promise.all(arr.map(async (file) => {
      const dataUrl = await new Promise((res) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(file);
      });
      return {
        id: Date.now() + Math.random(),
        dataUrl,
        mediaType: file.type || "image/jpeg",
        status: "pending",
        extracted: null,
        form: defaultForm(),
      };
    }));
    setQueue(q => {
      const updated = [...q, ...newItems];
      // Si no hay activo, activar el primero
      if (activeIdx === null && updated.length > 0) setActiveIdx(0);
      return updated;
    });
  };

  // Procesar pendientes de a uno
  useEffect(() => {
    const processNext = async () => {
      if (processingRef.current) return;
      const idx = queue.findIndex(i => i.status === "pending");
      if (idx === -1) return;
      processingRef.current = true;

      setQueue(q => q.map((item, i) => i === idx ? { ...item, status: "processing" } : item));

      try {
        const item = queue[idx];
        const base64 = item.dataUrl.split(",")[1];
        const extracted = await extraerDatosFotoBase64(base64, item.mediaType);
        setQueue(q => q.map((it, i) => i === idx ? {
          ...it, status: "done", extracted,
          form: buildForm(extracted, it.form),
        } : it));
      } catch (e) {
        console.error(e);
        setQueue(q => q.map((it, i) => i === idx ? { ...it, status: "error", errorMsg: e.message || "Error desconocido" } : it));
      }
      processingRef.current = false;
    };
    processNext();
  }, [queue]);

  const updateForm = (idx, field, value) => {
    setQueue(q => q.map((it, i) => i === idx ? { ...it, form: { ...it.form, [field]: value } } : it));
  };

  const saveItem = (idx) => {
    const item = queue[idx];
    if (!item.form.vendedoraId || !item.form.total) return;
    addVenta({ ...item.form, vendedoraId: Number(item.form.vendedoraId), total: Number(item.form.total) });
    setQueue(q => {
      const next = q.filter((_, i) => i !== idx);
      setActiveIdx(next.length > 0 ? 0 : null);
      return next;
    });
    setSavedCount(c => c + 1);
  };

  const removeItem = (idx) => {
    setQueue(q => {
      const next = q.filter((_, i) => i !== idx);
      setActiveIdx(next.length > 0 ? 0 : null);
      return next;
    });
  };

  const retryItem = (idx) => {
    setQueue(q => q.map((it, i) => i === idx ? { ...it, status: "pending", errorMsg: null } : it));
  };

  const activeItem = activeIdx !== null && queue[activeIdx] ? queue[activeIdx] : null;
  const pendingCount = queue.filter(i => i.status === "pending" || i.status === "processing").length;
  const doneCount = queue.filter(i => i.status === "done").length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* Zona de carga */}
      <div className="card" style={{ textAlign: "center" }}>
        <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Cargar comprobantes</p>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
          <input ref={fileRefMulti} type="file" accept="image/*" multiple style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }} />
          <button className="btn btn-primary" onClick={() => fileRefMulti.current?.click()}
            style={{ padding: "14px 24px", fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
            🖼️ Elegir fotos (múltiples)
          </button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }} />
          <button onClick={() => fileRef.current?.click()}
            style={{ background: "#FAF0EC", border: "1px solid #2A2A3E", borderRadius: 8, color: "#3D2B24", padding: "14px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
            📷 Sacar foto ahora
          </button>
        </div>
        <p style={{ fontSize: 12, color: "#9A7570", marginTop: 10 }}>Seleccioná todas las fotos del día de una vez — desde el carrete o reenviadas de WhatsApp</p>
        {savedCount > 0 && <p style={{ marginTop: 10, fontSize: 13, color: "#10B981", fontWeight: 600 }}>✓ {savedCount} {savedCount === 1 ? "venta guardada" : "ventas guardadas"}</p>}
      </div>

      {/* Cola */}
      {queue.length > 0 && (
        <div>
          {/* Miniaturas */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 16 }}>
            {queue.map((item, idx) => (
              <div key={item.id} onClick={() => setActiveIdx(idx)}
                style={{ position: "relative", flexShrink: 0, width: 64, height: 64, borderRadius: 8, overflow: "hidden", cursor: "pointer",
                  border: `2px solid ${activeIdx === idx ? "#C4785A" : item.status === "done" ? "#10B981" : item.status === "error" ? "#F87171" : "#D4B5A8"}`,
                  transition: "border 0.2s" }}>
                <img src={item.dataUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {item.status === "processing" && <><span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/></>}
                  {item.status === "done" && <span style={{ fontSize: 20, color: "#10B981" }}>✓</span>}
                  {item.status === "error" && <span style={{ fontSize: 20, color: "#F87171" }}>✕</span>}
                  {item.status === "pending" && <span style={{ fontSize: 10, color: "#7A5550" }}>espera</span>}
                </div>
                <button onClick={e => { e.stopPropagation(); removeItem(idx); }}
                  style={{ position: "absolute", top: 2, right: 2, background: "rgba(0,0,0,0.75)", border: "none", borderRadius: "50%", width: 18, height: 18, color: "#fff", cursor: "pointer", fontSize: 11, lineHeight: "18px", textAlign: "center", padding: 0 }}>×</button>
              </div>
            ))}
          </div>

          {pendingCount > 0 && (
            <p style={{ fontSize: 12, color: "#7A5550", marginBottom: 12 }}>
              <span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/>
              {" "}Procesando {pendingCount} foto{pendingCount > 1 ? "s" : ""}...
            </p>
          )}

          {/* Form item activo */}
          {activeItem && (
            <div className="card" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase" }}>
                  Foto {activeIdx + 1} de {queue.length}
                </p>
                <div style={{ display: "flex", gap: 6 }}>
                  {activeIdx > 0 && <button onClick={() => setActiveIdx(i => i - 1)} style={{ background: "#FAF0EC", border: "1px solid #2A2A3E", borderRadius: 6, color: "#7A5550", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>← Ant</button>}
                  {activeIdx < queue.length - 1 && <button onClick={() => setActiveIdx(i => i + 1)} style={{ background: "#FAF0EC", border: "1px solid #2A2A3E", borderRadius: 6, color: "#7A5550", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>Sig →</button>}
                </div>
              </div>

              {/* Preview + datos */}
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <img src={activeItem.dataUrl} alt="" style={{ width: 90, height: 90, objectFit: "cover", borderRadius: 8, flexShrink: 0, border: "1px solid #2A2A3E" }} />
                <div style={{ flex: 1 }}>
                  {activeItem.status === "processing" && (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0" }}>
                      <span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/>
                      <span style={{ fontSize: 13, color: "#7A5550" }}>Leyendo comprobante...</span>
                    </div>
                  )}
                  {activeItem.status === "error" && (
                    <div style={{ padding: "10px 0" }}>
                      <p style={{ fontSize: 13, color: "#F87171", marginBottom: 6 }}>Error: {activeItem.errorMsg || "No se pudo procesar"}</p>
                      <button onClick={() => retryItem(activeIdx)} style={{ background: "#F59E0B22", border: "1px solid #F59E0B", borderRadius: 6, color: "#C4785A", padding: "6px 14px", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>
                        🔄 Reintentar
                      </button>
                    </div>
                  )}
                  {activeItem.extracted && (
                    <ItemsDetectados extracted={activeItem.extracted} fmtPeso={fmtPeso} />
                  )}
                </div>
              </div>

              {/* Campos */}
              <div>
                <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Cliente</label>
                <input className="input" value={activeItem.form.cliente}
                  onChange={e => {
                    const val = e.target.value;
                    updateForm(activeIdx, "cliente", val);
                    const auto = clientes[val.toLowerCase().trim()];
                    if (auto) updateForm(activeIdx, "vendedoraId", String(auto));
                  }} placeholder="Nombre del cliente" />
                {activeItem.form.cliente && clientes[activeItem.form.cliente.toLowerCase().trim()] && (
                  <p style={{ fontSize: 11, color: "#10B981", marginTop: 4 }}>
                    ✓ Cliente conocido → {vendedoras.find(v => v.id === clientes[activeItem.form.cliente.toLowerCase().trim()])?.nombre}
                  </p>
                )}
              </div>

              <div>
                <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Vendedora</label>
                <select className="input" value={activeItem.form.vendedoraId}
                  onChange={e => updateForm(activeIdx, "vendedoraId", e.target.value)}>
                  <option value="">Seleccionar...</option>
                  {vendedoras.map(v => <option key={v.id} value={v.id}>{v.nombre} ({v.comision}%)</option>)}
                </select>
              </div>

              <div className="grid2">
                <div>
                  <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Total venta</label>
                  <input className="input" type="number" value={activeItem.form.total}
                    onChange={e => updateForm(activeIdx, "total", e.target.value)} placeholder="0" />
                </div>
                <div>
                  <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Fecha</label>
                  <input className="input" type="date" value={activeItem.form.fecha}
                    onChange={e => updateForm(activeIdx, "fecha", e.target.value)} />
                </div>
              </div>

              <div>
                <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Nota (opcional)</label>
                <input className="input" value={activeItem.form.nota}
                  onChange={e => updateForm(activeIdx, "nota", e.target.value)} placeholder="..." />
              </div>

              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn btn-primary" onClick={() => saveItem(activeIdx)}
                  disabled={!activeItem.form.vendedoraId || !activeItem.form.total || activeItem.status === "processing"}
                  style={{ flex: 1, padding: 14, fontSize: 15, opacity: (!activeItem.form.vendedoraId || !activeItem.form.total || activeItem.status === "processing") ? 0.5 : 1 }}>
                  Guardar venta {doneCount > 1 ? `(quedan ${doneCount})` : ""}
                </button>
                <button onClick={() => removeItem(activeIdx)}
                  style={{ background: "#FAF0EC", border: "1px solid #2A2A3E", borderRadius: 8, color: "#F87171", padding: "14px 16px", cursor: "pointer", fontSize: 20 }}>🗑</button>
              </div>
            </div>
          )}
        </div>
      )}

      {queue.length === 0 && savedCount === 0 && (
        <div className="card" style={{ textAlign: "center", padding: 40, color: "#9A7570" }}>
          <p style={{ fontSize: 36, marginBottom: 10 }}>📋</p>
          <p style={{ fontSize: 14 }}>Subí una o varias fotos para empezar</p>
          <p style={{ fontSize: 12, marginTop: 6 }}>La IA leerá los datos automáticamente</p>
        </div>
      )}
    </div>
  );
}

// ─── COMISIONES ───────────────────────────────────────────────────────────────
function Comisiones({ ventas, vendedoras, pagos, addPago, currentMes, getComisionMes, getPagadoMes, fmtPeso, MESES, getMonthKey }) {
  const [mesSel, setMesSel] = useState(currentMes);
  const [pagandoId, setPagandoId] = useState(null);
  const [montoPago, setMontoPago] = useState("");

  const meses = [...new Set(ventas.map(v => getMonthKey(v.fecha)))].sort().reverse();
  if (!meses.includes(currentMes)) meses.unshift(currentMes);

  const handlePago = (vendedoraId) => {
    if (!montoPago) return;
    addPago(vendedoraId, montoPago, mesSel);
    setMontoPago("");
    setPagandoId(null);
  };

  const formatMes = (key) => {
    const [y, m] = key.split("-");
    return `${MESES[parseInt(m) - 1]} ${y}`;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Mes</label>
        <select className="input" value={mesSel} onChange={e => setMesSel(e.target.value)} style={{ maxWidth: 220 }}>
          {meses.map(m => <option key={m} value={m}>{formatMes(m)}</option>)}
        </select>
      </div>

      {vendedoras.map(v => {
        const comision = getComisionMes(v.id, mesSel);
        const pagado = getPagadoMes(v.id, mesSel);
        const deuda = comision - pagado;
        const pagosMes = pagos.filter(p => p.vendedoraId === v.id && p.mes === mesSel);
        const ventasMes = ventas.filter(vt => vt.vendedoraId === v.id && getMonthKey(vt.fecha) === mesSel);
        const totalVentas = ventasMes.reduce((s, vt) => s + Number(vt.total || 0), 0);

        return (
          <div key={v.id} className="card" style={{ borderLeft: `3px solid ${v.color}` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: v.color + "22", border: `2px solid ${v.color}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: v.color }}>{v.nombre[0]}</span>
                </div>
                <div>
                  <p style={{ fontWeight: 700, fontSize: 15 }}>{v.nombre}</p>
                  <p style={{ fontSize: 11, color: "#8B6560" }}>{v.comision}% de comisión</p>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <p style={{ fontSize: 20, fontWeight: 700, color: deuda > 0 ? "#F87171" : "#10B981" }}>{fmtPeso(Math.abs(deuda))}</p>
                <p style={{ fontSize: 11, color: "#8B6560" }}>{deuda > 0 ? "a pagar" : "al día"}</p>
              </div>
            </div>

            <div style={{ background: "#FDF5F2", borderRadius: 8, padding: 12, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span style={{ color: "#7A5550" }}>Total ventas</span>
                <span>{fmtPeso(totalVentas)} ({ventasMes.length} ops)</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span style={{ color: "#7A5550" }}>Comisión ({v.comision}%)</span>
                <span style={{ color: "#C4785A", fontWeight: 600 }}>{fmtPeso(comision)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                <span style={{ color: "#7A5550" }}>Ya pagado</span>
                <span style={{ color: "#10B981" }}>{fmtPeso(pagado)}</span>
              </div>
            </div>

            {pagosMes.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#9A7570", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Pagos registrados</p>
                {pagosMes.map(p => (
                  <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#7A5550", padding: "4px 0" }}>
                    <span>{p.fecha}</span>
                    <span style={{ color: "#10B981" }}>+{fmtPeso(p.monto)}</span>
                  </div>
                ))}
              </div>
            )}

            {pagandoId === v.id ? (
              <div style={{ display: "flex", gap: 8 }}>
                <input className="input" type="number" value={montoPago} onChange={e => setMontoPago(e.target.value)} placeholder="Monto pagado" style={{ flex: 1 }} autoFocus />
                <button className="btn btn-primary btn-sm" onClick={() => handlePago(v.id)}>✓</button>
                <button onClick={() => setPagandoId(null)} style={{ background: "#FAF0EC", border: "1px solid #2A2A3E", borderRadius: 8, color: "#7A5550", padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>✕</button>
              </div>
            ) : (
              <button className="btn btn-primary btn-sm" onClick={() => { setPagandoId(v.id); setMontoPago(""); }} style={{ width: "100%" }}>
                Registrar pago de comisión
              </button>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── HISTORIAL ────────────────────────────────────────────────────────────────
function Historial({ ventas, vendedoras, fmtPeso, MESES, getMonthKey }) {
  const [filtroVendedora, setFiltroVendedora] = useState("all");
  const [filtroMes, setFiltroMes] = useState("all");

  const meses = [...new Set(ventas.map(v => getMonthKey(v.fecha)))].sort().reverse();

  const filtradas = ventas.filter(v => {
    if (filtroVendedora !== "all" && String(v.vendedoraId) !== filtroVendedora) return false;
    if (filtroMes !== "all" && getMonthKey(v.fecha) !== filtroMes) return false;
    return true;
  });

  const formatMes = (key) => {
    const [y, m] = key.split("-");
    return `${MESES[parseInt(m) - 1]} ${y}`;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="grid2">
        <div>
          <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Vendedora</label>
          <select className="input" value={filtroVendedora} onChange={e => setFiltroVendedora(e.target.value)}>
            <option value="all">Todas</option>
            {vendedoras.map(v => <option key={v.id} value={v.id}>{v.nombre}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize: 12, color: "#7A5550", marginBottom: 6, display: "block" }}>Mes</label>
          <select className="input" value={filtroMes} onChange={e => setFiltroMes(e.target.value)}>
            <option value="all">Todos</option>
            {meses.map(m => <option key={m} value={m}>{formatMes(m)}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "12px 16px", borderBottom: "1px solid #1E1E2E", display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: 11, color: "#8B6560", textTransform: "uppercase", letterSpacing: "0.1em" }}>{filtradas.length} ventas</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#C4785A" }}>{fmtPeso(filtradas.reduce((s, v) => s + Number(v.total || 0), 0))}</span>
        </div>
        {filtradas.length === 0 && <p style={{ padding: 24, textAlign: "center", color: "#9A7570", fontSize: 13 }}>Sin ventas en este período</p>}
        {filtradas.map(v => {
          const vend = vendedoras.find(vv => vv.id === v.vendedoraId);
          return (
            <div key={v.id} style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: "1px solid #1A1A25", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: vend?.color || "#444", flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 14, fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{v.cliente || "Sin nombre"}</p>
                <p style={{ fontSize: 11, color: "#8B6560", marginTop: 2 }}>{v.fecha} · {vend?.nombre}</p>
                {v.nota && <p style={{ fontSize: 11, color: "#9A7570", marginTop: 1 }}>{v.nota}</p>}
              </div>
              <span style={{ fontSize: 15, fontWeight: 700, flexShrink: 0 }}>{fmtPeso(v.total)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function Config({ vendedoras, setVendedoras, clientes, setClientes, ventas, setVentas, setPagos }) {
  const [nueva, setNueva] = useState({ nombre: "", comision: "", color: "#8B5CF6" });
  const [editId, setEditId] = useState(null);
  const [editComision, setEditComision] = useState("");

  const addVendedora = () => {
    if (!nueva.nombre || !nueva.comision) return;
    setVendedoras(v => [...v, { id: Date.now(), nombre: nueva.nombre, comision: Number(nueva.comision), color: nueva.color }]);
    setNueva({ nombre: "", comision: "", color: "#8B5CF6" });
  };

  const [apiKey, setApiKey] = useState(() => localStorage.getItem("cv_apikey") || "");
  const [apiKeySaved, setApiKeySaved] = useState(false);

  const saveApiKey = () => {
    localStorage.setItem("cv_apikey", apiKey);
    setApiKeySaved(true);
    setTimeout(() => setApiKeySaved(false), 2000);
  };

  const clientesArr = Object.entries(clientes).map(([nombre, vendedoraId]) => ({ nombre, vendedoraId }));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div className="card" style={{ borderLeft: "3px solid #F59E0B" }}>
        <p style={{ fontSize: 11, color: "#C4785A", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>API Key de Gemini (gratis)</p>
        <p style={{ fontSize: 12, color: "#7A5550", marginBottom: 10 }}>Gratis en <strong style={{color:"#3D2B24"}}>aistudio.google.com/apikey</strong> → "Create API key" → copiá y pegá acá</p>
        <div style={{ display: "flex", gap: 8 }}>
          <input className="input" type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." style={{ flex: 1 }} />
          <button className="btn btn-primary btn-sm" onClick={saveApiKey}>Guardar</button>
        </div>
        {apiKeySaved && <p style={{ fontSize: 12, color: "#10B981", marginTop: 6 }}>✓ Guardada</p>}
        {!localStorage.getItem("cv_apikey") && <p style={{ fontSize: 12, color: "#F87171", marginTop: 6 }}>⚠ Sin API key — la lectura de fotos no funcionará</p>}
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Vendedoras</p>
        {vendedoras.map(v => (
          <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: "1px solid #1E1E2E" }}>
            <div style={{ width: 12, height: 12, borderRadius: "50%", background: v.color, flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 14 }}>{v.nombre}</span>
            {editId === v.id ? (
              <>
                <input className="input" type="number" value={editComision} onChange={e => setEditComision(e.target.value)} style={{ width: 70 }} />
                <span style={{ fontSize: 12, color: "#7A5550" }}>%</span>
                <button className="btn btn-primary btn-sm" onClick={() => { setVendedoras(vs => vs.map(vv => vv.id === v.id ? { ...vv, comision: Number(editComision) } : vv)); setEditId(null); }}>✓</button>
              </>
            ) : (
              <>
                <span style={{ fontSize: 13, color: "#C4785A" }}>{v.comision}%</span>
                <button onClick={() => { setEditId(v.id); setEditComision(String(v.comision)); }} style={{ background: "none", border: "1px solid #2A2A3E", borderRadius: 6, color: "#7A5550", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>Editar</button>
              </>
            )}
          </div>
        ))}
        <div style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
          <input className="input" value={nueva.nombre} onChange={e => setNueva(n => ({ ...n, nombre: e.target.value }))} placeholder="Nombre" style={{ flex: 1, minWidth: 100 }} />
          <input className="input" type="number" value={nueva.comision} onChange={e => setNueva(n => ({ ...n, comision: e.target.value }))} placeholder="%" style={{ width: 70 }} />
          <input type="color" value={nueva.color} onChange={e => setNueva(n => ({ ...n, color: e.target.value }))} style={{ width: 40, height: 40, border: "none", borderRadius: 8, cursor: "pointer", background: "none" }} />
          <button className="btn btn-primary btn-sm" onClick={addVendedora}>+ Agregar</button>
        </div>
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#8B6560", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Clientes vinculados ({clientesArr.length})</p>
        {clientesArr.length === 0 && <p style={{ fontSize: 13, color: "#9A7570" }}>Se van registrando automáticamente al cargar ventas</p>}
        <div style={{ maxHeight: 220, overflowY: "auto", display: "flex", flexDirection: "column", gap: 4 }}>
          {clientesArr.map(({ nombre, vendedoraId }) => {
            const v = vendedoras.find(vv => vv.id === vendedoraId);
            return (
              <div key={nombre} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, padding: "4px 0", borderBottom: "1px solid #1A1A25" }}>
                <span style={{ textTransform: "capitalize" }}>{nombre}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: v?.color || "#7A5550", fontSize: 12 }}>{v?.nombre || "?"}</span>
                  <button onClick={() => setClientes(c => { const nc = { ...c }; delete nc[nombre]; return nc; })} style={{ background: "none", border: "none", color: "#F87171", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{ borderColor: "#F8717133" }}>
        <p style={{ fontSize: 11, color: "#F87171", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>Zona peligrosa</p>
        <button onClick={() => { if (window.confirm("¿Borrar TODOS los datos?")) { setVentas([]); setPagos([]); setClientes({}); } }}
          style={{ background: "#F8717122", border: "1px solid #F87171", borderRadius: 8, color: "#F87171", padding: "8px 16px", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans',sans-serif" }}>
          Borrar todos los datos
        </button>
      </div>
    </div>
  );
}


function LoginScreen({ onLogin }) {
  const [user, setUser] = React.useState("");
  const [pass, setPass] = React.useState("");
  const [error, setError] = React.useState(false);
  const handleLogin = () => {
    if (user.toLowerCase() === "criterio" && pass.toLowerCase() === "comida") {
      onLogin();
    } else {
      setError(true);
      setTimeout(() => setError(false), 2000);
    }
  };
  return (
    <div style={{ minHeight: "100vh", background: "#F5EDE8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif" }}>
      <div style={{ background: "#FFF", borderRadius: 16, padding: 40, width: 320, boxShadow: "0 4px 24px rgba(196,120,90,0.15)", textAlign: "center" }}>
        <div style={{ fontFamily: "Georgia, serif", fontSize: 36, fontWeight: 900, color: "#C4785A", letterSpacing: "-0.02em", marginBottom: 4 }}>CRITERIO</div>
        <p style={{ color: "#9A7570", fontSize: 13, marginBottom: 32, letterSpacing: "0.1em", textTransform: "uppercase" }}>Ventas</p>
        <input value={user} onChange={e => setUser(e.target.value)} placeholder="Usuario" style={{ width: "100%", padding: "10px 14px", border: "1px solid #D4B5A8", borderRadius: 8, fontSize: 14, marginBottom: 12, boxSizing: "border-box", fontFamily: "inherit", outline: "none", background: "#FAF0EC" }} />
        <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Contraseña" style={{ width: "100%", padding: "10px 14px", border: "1px solid #D4B5A8", borderRadius: 8, fontSize: 14, marginBottom: 16, boxSizing: "border-box", fontFamily: "inherit", outline: "none", background: "#FAF0EC" }} />
        {error && <p style={{ color: "#E05A3A", fontSize: 13, marginBottom: 12 }}>Usuario o contraseña incorrectos</p>}
        <button onClick={handleLogin} style={{ width: "100%", padding: "12px", background: "#C4785A", color: "#FFF", border: "none", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Ingresar</button>
      </div>
    </div>
  );
}

function Root() {
  const [logged, setLogged] = React.useState(() => sessionStorage.getItem("cv_logged") === "1");
  const handleLogin = () => { sessionStorage.setItem("cv_logged", "1"); setLogged(true); };
  if (!logged) return React.createElement(LoginScreen, { onLogin: handleLogin });
  return React.createElement(App);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));

  </script>
</body>
