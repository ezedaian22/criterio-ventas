// Fuzzy matching para nombres de clientes
function similaridad(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  if (a === b) return 1;
  if (a.includes(b) || b.includes(a)) return 0.9;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  let matches = 0;
  for (let i = 0; i < shorter.length; i++) {
    if (longer.includes(shorter[i])) matches++;
  }
  return matches / longer.length;
}

function buscarCliente(nombre, clientesObj) {
  if (!nombre) return null;
  const key = nombre.toLowerCase().trim();
  if (clientesObj[key] !== undefined) return clientesObj[key];
  let mejorMatch = null;
  let mejorScore = 0.85; // umbral mínimo 85%
  for (const k of Object.keys(clientesObj)) {
    const score = similaridad(key, k);
    if (score > mejorScore) {
      mejorScore = score;
      mejorMatch = clientesObj[k];
    }
  }
  return mejorMatch;
}


// DB helpers
async function dbGetAll(table) {
  let all = [];
  let from = 0;
  const pageSize = 1000;
  while (true) {
    const { data, error } = await sb.from(table).select("*").order("created_at", { ascending: false }).range(from, from + pageSize - 1);
    if (error) { console.error(table, error); break; }
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  const data = all;
  if (true) console.log(table, "total cargados:", data.length);
  // Normalize fecha to string to avoid timezone issues
  if (data && (table === "ventas" || table === "pagos")) {
    data.forEach(row => {
      if (row.fecha) {
        // If Date object, convert to YYYY-MM-DD string
        if (row.fecha instanceof Date) {
          row.fecha = row.fecha.toISOString().substring(0, 10);
        } else {
          row.fecha = String(row.fecha).substring(0, 10);
        }
      }
    });
  }
  return data || [];
}
async function dbInsert(table, row) {
  const { data, error } = await sb.from(table).insert([row]).select();
  if (error) console.error("insert", table, error);
  return data?.[0];
}
async function dbDelete(table, id) {
  const { error } = await sb.from(table).delete().eq("id", id);
  if (error) console.error("delete", table, error);
}
async function dbUpdate(table, id, updates) {
  const { error } = await sb.from(table).update(updates).eq("id", id);
  if (error) console.error("update", table, error);
}

const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function fmtPeso(n) {
  return "$" + Number(n || 0).toLocaleString("es-AR", { minimumFractionDigits: 0 });
}

function getMonthKey(date) {
  if (!date) return "";
  // Handle Date objects from Supabase
  if (date instanceof Date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
  }
  // Handle ISO string "2023-03-15" or "2023-03-15T..."
  const str = String(date);
  if (str.match(/^\d{4}-\d{2}/)) {
    return str.substring(0, 7); // "2023-03"
  }
  // Fallback: slice string directly to avoid timezone issues
  return String(date).substring(0, 7);
}

function Dashboard({ ventas, vendedoras, pagos, currentMes, getComisionMes, getPagadoMes, fmtPeso, MESES, getMonthKey }) {
  const mesActual = ventas.filter(v => getMonthKey(v.fecha) === currentMes);
  const totalMes = mesActual.reduce((s, v) => s + Number(v.total || 0), 0);

  const [yr, mo] = currentMes.split("-").map(Number);
  const ultimos6 = Array.from({ length: 6 }, (_, i) => {
    let m = mo - i; let y = yr;
    if (m < 1) { m += 12; y -= 1; }
    const key = `${y}-${String(m).padStart(2, "0")}`;
    const total = ventas.filter(v => getMonthKey(v.fecha) === key).reduce((s, v) => s + Number(v.total || 0), 0);
    return { label: MESES[m - 1], total, key };
  }).reverse();

  const maxTotal = Math.max(...ultimos6.map(m => m.total), 1);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div className="grid3">
        <StatCard label="Ventas este mes" value={fmtPeso(totalMes)} accent="#A85D43" sub={`${mesActual.length} operaciones`} />
        <StatCard label="Cantidad ventas" value={mesActual.length} accent="#10B981" sub="mes actual" />
        <StatCard label="Ticket promedio" value={fmtPeso(mesActual.length ? totalMes / mesActual.length : 0)} accent="#6366F1" sub="mes actual" />
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#6B4A3E", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>Evolución últimos 6 meses</p>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 12, height: 100 }}>
          {ultimos6.map((m, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 10, color: "#7A5848" }}>{fmtPeso(m.total).slice(0, 9)}</span>
              <div style={{ width: "100%", height: `${Math.max((m.total / maxTotal) * 80, 4)}px`, background: m.key === currentMes ? "#A85D43" : "#D4A090", borderRadius: 4, transition: "height 0.5s ease" }} />
              <span style={{ fontSize: 11, color: m.key === currentMes ? "#A85D43" : "#6B4A3E", fontWeight: m.key === currentMes ? 700 : 400 }}>{m.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#6B4A3E", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Vendedoras — mes actual</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {vendedoras.map(v => {
            const tventa = mesActual.filter(vt => (vt.vendedora_id || vt.vendedoraId) === v.id).reduce((s, vt) => s + Number(vt.total || 0), 0);
            const comision = getComisionMes(v.id, currentMes);
            const pagado = getPagadoMes(v.id, currentMes);
            const deuda = comision - pagado;
            return (
              <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 16, padding: "12px 0", borderBottom: "1px solid #1E1E2E" }}>
                <div style={{ width: 36, height: 36, borderRadius: "50%", background: v.color + "22", border: `2px solid ${v.color}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: v.color }}>{v.nombre[0]}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ fontWeight: 600, fontSize: 14 }}>{v.nombre} <span style={{ fontSize: 11, color: "#6B4A3E" }}>({v.comision}%)</span></p>
                  <p style={{ fontSize: 12, color: "#5A3828", marginTop: 2 }}>{fmtPeso(tventa)} en ventas</p>
                </div>
                <div style={{ textAlign: "right" }}>
                  <p style={{ fontSize: 13, fontWeight: 700, color: deuda > 0 ? "#F87171" : "#10B981" }}>{fmtPeso(Math.abs(deuda))}</p>
                  <p style={{ fontSize: 10, color: "#6B4A3E" }}>{deuda > 0 ? "a pagar" : "al día"}</p>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

let lastKeyUsed = 0; // 0 = primary, 1 = backup

async function extraerDatosFotoBase64(base64, mediaType) {
  const primaryKey = localStorage.getItem("cv_apikey") || "";
  const extraKeys = [
    "AIzaSyCz_giy7GkfdrVFSUUtGReuks4lTS1Rjs0",
    "AIzaSyCEgFSeqBotUD5atWn6hvpsBGi67Kz7VUI",
    "AIzaSyDlCfD_PZfQbJFiW_m6G_00oePczpLAerk",
    "AIzaSyDxfXbJ63qLy1bG_NOmYBrPLZPJeawVKbo",
    "AIzaSyAM4UkPCnYGjxRMdCjvBmLoqKrP7KWvt1g",
    "AIzaSyBXUjwwRnlQcNl29bwGGcnIKfHtoKhrf5g"
  ];
  const keys = [primaryKey, BACKUP_API_KEY, ...extraKeys].filter(Boolean);
  if (keys.length === 0) throw new Error("Falta la API key de Gemini. Andá a Config y agregala.");
  
  // Try current key first, then the other one
  const orderedKeys = [...keys.slice(lastKeyUsed % keys.length), ...keys.slice(0, lastKeyUsed % keys.length)];
  
  let lastError;
  for (let i = 0; i < orderedKeys.length; i++) {
    const apiKey = orderedKeys[i];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [
        { inline_data: { mime_type: mediaType, data: base64 } },
        { text: PROMPT_EXTRACCION }
      ]}],
      generationConfig: { temperature: 0.1 }
    })
  });
    let data;
    try { data = await resp.json(); } catch(e) { lastError = new Error("HTTP " + resp.status); continue; }
    if (resp.status === 429 || (data.error && data.error.code === 429)) {
      // Rate limited — try next key
      lastKeyUsed = (lastKeyUsed + 1) % keys.length;
      lastError = new Error("Cuota excedida, intentando con otra key...");
      continue;
    }
    if (!resp.ok || data.error) {
      lastError = new Error("API " + resp.status + ": " + (data.error?.message || JSON.stringify(data).slice(0, 120)));
      continue;
    }
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    if (!text) { lastError = new Error("Respuesta vacía."); continue; }
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) { lastError = new Error("Sin JSON: " + text.slice(0, 80)); continue; }
    try { return JSON.parse(match[0]); }
    catch(e) { lastError = new Error("JSON inválido"); continue; }
  }
  throw lastError || new Error("No se pudo procesar la imagen");
}

      <p style={{ fontSize: 10, color: "#A85D43", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>✓ Detectado</p>
      {visible.map((it, i) => (
        <p key={i} style={{ fontSize: 11, color: "#AAA", marginBottom: 2 }}>{it.cantidad}x {it.descripcion} — {fmtPeso(it.total)}</p>
      ))}
      {items.length > 3 && (
        <button onClick={() => setExpanded(e => !e)} style={{ background: "none", border: "none", color: "#A85D43", cursor: "pointer", fontSize: 11, padding: "4px 0", textDecoration: "underline" }}>
          {expanded ? "Ver menos ▲" : `+${items.length - 3} más... Ver todos ▼`}
        </button>
      )}
      {extracted.descuento && <p style={{ fontSize: 11, color: "#F87171", marginTop: 4 }}>Descuento: -{fmtPeso(extracted.descuento)}</p>}
      <p style={{ fontSize: 13, fontWeight: 700, color: "#A85D43", marginTop: 4 }}>Total: {fmtPeso(extracted.totalConDescuento ?? extracted.total)}</p>
    </div>
  );
}

function NuevaVenta({ vendedoras, clientes, addVenta, fmtPeso }) {
  const fileRef = useRef();
  const fileRefMulti = useRef();

  const [queue, setQueue] = useState([]);
  const [activeIdx, setActiveIdx] = useState(null);
  const [savedCount, setSavedCount] = useState(0);
  const [manualOpen, setManualOpen] = useState(false);
  const [manualForm, setManualForm] = useState({ cliente: "", vendedoraId: "", total: "", fecha: new Date().toISOString().split("T")[0], nota: "" });
  const [manualSaved, setManualSaved] = useState(false);
  const processingRef = useRef(false);

  const defaultForm = () => ({
    cliente: "", vendedoraId: "", total: "",
    fecha: new Date().toISOString().split("T")[0], nota: ""
  });

  const buildForm = (extracted, prevForm) => {
    const clienteLower = (extracted?.cliente || "").toLowerCase().trim();
    const vendedoraIdAuto = buscarCliente(clienteLower, clientes) || "";
    const totalFinal = extracted?.totalConDescuento ?? extracted?.total ?? "";
    return {
      cliente: extracted?.cliente || prevForm?.cliente || "",
      vendedoraId: vendedoraIdAuto ? String(vendedoraIdAuto) : (prevForm?.vendedoraId || ""),
      total: totalFinal !== null && totalFinal !== undefined && totalFinal !== "" ? totalFinal : (prevForm?.total || ""),
      fecha: extracted?.fecha || prevForm?.fecha || new Date().toISOString().split("T")[0],
      nota: prevForm?.nota || "",
    };
  };

  // Leer archivos como dataUrl (base64) — funciona en todos los entornos
  const addFiles = async (files) => {
    const arr = Array.from(files);
    const newItems = await Promise.all(arr.map(async (file) => {
      const dataUrl = await new Promise((res) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(file);
      });
      return {
        id: Date.now() + Math.random(),
        dataUrl,
        mediaType: file.type || "image/jpeg",
        status: "pending",
        extracted: null,
        form: defaultForm(),
      };
    }));
    setQueue(q => {
      const updated = [...q, ...newItems];
      // Si no hay activo, activar el primero
      if (activeIdx === null && updated.length > 0) setActiveIdx(0);
      return updated;
    });
  };

  // Procesar pendientes de a uno
  useEffect(() => {
    const processNext = async () => {
      if (processingRef.current) return;
      const idx = queue.findIndex(i => i.status === "pending");
      if (idx === -1) return;
      processingRef.current = true;

      setQueue(q => q.map((item, i) => i === idx ? { ...item, status: "processing" } : item));

      try {
        const item = queue[idx];
        const base64 = item.dataUrl.split(",")[1];
        const extracted = await extraerDatosFotoBase64(base64, item.mediaType);
        setQueue(q => q.map((it, i) => i === idx ? {
          ...it, status: "done", extracted,
          form: buildForm(extracted, it.form),
        } : it));
      } catch (e) {
        console.error(e);
        setQueue(q => q.map((it, i) => i === idx ? { ...it, status: "error", errorMsg: e.message || "Error desconocido" } : it));
      }
      processingRef.current = false;
    };
    processNext();
  }, [queue]);

  const updateForm = (idx, field, value) => {
    setQueue(q => q.map((it, i) => i === idx ? { ...it, form: { ...it.form, [field]: value } } : it));
  };

  const saveItem = (idx) => {
    const item = queue[idx];
    if (!item.form.vendedoraId || !item.form.total) return;
    addVenta({ ...item.form, vendedoraId: Number(item.form.vendedoraId), total: Number(item.form.total) });
    setQueue(q => {
      const next = q.filter((_, i) => i !== idx);
      setActiveIdx(next.length > 0 ? 0 : null);
      return next;
    });
    setSavedCount(c => c + 1);
  };

  const removeItem = (idx) => {
    setQueue(q => {
      const next = q.filter((_, i) => i !== idx);
      setActiveIdx(next.length > 0 ? 0 : null);
      return next;
    });
  };

  const retryItem = (idx) => {
    setQueue(q => q.map((it, i) => i === idx ? { ...it, status: "pending", errorMsg: null } : it));
  };

  const activeItem = activeIdx !== null && queue[activeIdx] ? queue[activeIdx] : null;
  const pendingCount = queue.filter(i => i.status === "pending" || i.status === "processing").length;
  const doneCount = queue.filter(i => i.status === "done").length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

      {/* Zona de carga */}
      <div className="card" style={{ textAlign: "center" }}>
        <p style={{ fontSize: 11, color: "#6B4A3E", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>Cargar comprobantes</p>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
          <input ref={fileRefMulti} type="file" accept="image/*" multiple style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }} />
          <button className="btn btn-primary" onClick={() => fileRefMulti.current?.click()}
            style={{ padding: "14px 24px", fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
            🖼️ Elegir fotos (múltiples)
          </button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }}
            onChange={e => { addFiles(e.target.files); e.target.value = ""; }} />
          <button onClick={() => fileRef.current?.click()}
            style={{ background: "#FFF8F5", border: "1px solid #2A2A3E", borderRadius: 8, color: "#2C1A14", padding: "14px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
            📷 Sacar foto ahora
          </button>
          <button onClick={() => setManualOpen(true)}
            style={{ background: "#FFF8F5", border: "1px solid #D4A090", borderRadius: 8, color: "#2C1A14", padding: "14px 24px", fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
            ✏️ Carga manual
          </button>
        </div>
        <p style={{ fontSize: 12, color: "#7A5848", marginTop: 10 }}>Seleccioná todas las fotos del día de una vez — desde el carrete o reenviadas de WhatsApp</p>
        {savedCount > 0 && <p style={{ marginTop: 10, fontSize: 13, color: "#10B981", fontWeight: 600 }}>✓ {savedCount} {savedCount === 1 ? "venta guardada" : "ventas guardadas"}</p>}
      </div>

      {/* Cola */}
      {queue.length > 0 && (
        <div>
          {/* Miniaturas */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 16 }}>
            {queue.map((item, idx) => (
              <div key={item.id} onClick={() => setActiveIdx(idx)}
                style={{ position: "relative", flexShrink: 0, width: 64, height: 64, borderRadius: 8, overflow: "hidden", cursor: "pointer",
                  border: `2px solid ${activeIdx === idx ? "#A85D43" : item.status === "done" ? "#10B981" : item.status === "error" ? "#F87171" : "#D4A090"}`,
                  transition: "border 0.2s" }}>
                <img src={item.dataUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {item.status === "processing" && <><span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/></>}
                  {item.status === "done" && <span style={{ fontSize: 20, color: "#10B981" }}>✓</span>}
                  {item.status === "error" && <span style={{ fontSize: 20, color: "#F87171" }}>✕</span>}
                  {item.status === "pending" && <span style={{ fontSize: 10, color: "#5A3828" }}>espera</span>}
                </div>
                <button onClick={e => { e.stopPropagation(); removeItem(idx); }}
                  style={{ position: "absolute", top: 2, right: 2, background: "rgba(0,0,0,0.75)", border: "none", borderRadius: "50%", width: 18, height: 18, color: "#fff", cursor: "pointer", fontSize: 11, lineHeight: "18px", textAlign: "center", padding: 0 }}>×</button>
              </div>
            ))}
          </div>

          {pendingCount > 0 && (
            <p style={{ fontSize: 12, color: "#5A3828", marginBottom: 12 }}>
              <span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/>
              {" "}Procesando {pendingCount} foto{pendingCount > 1 ? "s" : ""}...
            </p>
          )}

          {/* Form item activo */}
          {activeItem && (
            <div className="card" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <p style={{ fontSize: 11, color: "#6B4A3E", letterSpacing: "0.1em", textTransform: "uppercase" }}>
                  Foto {activeIdx + 1} de {queue.length}
                </p>
                <div style={{ display: "flex", gap: 6 }}>
                  {activeIdx > 0 && <button onClick={() => setActiveIdx(i => i - 1)} style={{ background: "#FFF8F5", border: "1px solid #2A2A3E", borderRadius: 6, color: "#5A3828", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>← Ant</button>}
                  {activeIdx < queue.length - 1 && <button onClick={() => setActiveIdx(i => i + 1)} style={{ background: "#FFF8F5", border: "1px solid #2A2A3E", borderRadius: 6, color: "#5A3828", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>Sig →</button>}
                </div>
              </div>

              {/* Preview + datos */}
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                <img src={activeItem.dataUrl} alt="" style={{ width: 90, height: 90, objectFit: "cover", borderRadius: 8, flexShrink: 0, border: "1px solid #2A2A3E" }} />
                <div style={{ flex: 1 }}>
                  {activeItem.status === "processing" && (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 0" }}>
                      <span className="loading-dot"/><span className="loading-dot"/><span className="loading-dot"/>
                      <span style={{ fontSize: 13, color: "#5A3828" }}>Leyendo comprobante...</span>
                    </div>
                  )}
                  {activeItem.status === "error" && (
                    <div style={{ padding: "10px 0" }}>
                      <p style={{ fontSize: 13, color: "#F87171", marginBottom: 6 }}>Error: {activeItem.errorMsg || "No se pudo procesar"}</p>
                      <button onClick={() => retryItem(activeIdx)} style={{ background: "#F59E0B22", border: "1px solid #F59E0B", borderRadius: 6, color: "#A85D43", padding: "6px 14px", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>
                        🔄 Reintentar
                      </button>
                    </div>
                  )}
                  {activeItem.extracted && (
                    <ItemsDetectados extracted={activeItem.extracted} fmtPeso={fmtPeso} />
                  )}
                </div>
              </div>

              {/* Campos */}
              <div>
                <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Cliente</label>
                <input className="input" value={activeItem.form.cliente}
                  onChange={e => {
                    const val = e.target.value;
                    updateForm(activeIdx, "cliente", val);
                    const auto = buscarCliente(val, clientes);
                    if (auto) updateForm(activeIdx, "vendedoraId", String(auto));
                  }} placeholder="Nombre del cliente" />
                {activeItem.form.cliente && buscarCliente(activeItem.form.cliente, clientes) && (
                  <p style={{ fontSize: 11, color: "#10B981", marginTop: 4 }}>
                    ✓ Cliente conocido → {vendedoras.find(v => v.id === buscarCliente(activeItem.form.cliente, clientes))?.nombre}
                  </p>
                )}
              </div>

              <div>
                <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Vendedora</label>
                <select className="input" value={activeItem.form.vendedoraId}
                  onChange={e => updateForm(activeIdx, "vendedoraId", e.target.value)}>
                  <option value="">Seleccionar...</option>
                  {vendedoras.map(v => <option key={v.id} value={v.id}>{v.nombre} ({v.comision}%)</option>)}
                </select>
              </div>

              <div className="grid2">
                <div>
                  <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Total venta</label>
                  <input className="input" type="number" value={activeItem.form.total}
                    onChange={e => updateForm(activeIdx, "total", e.target.value)} placeholder="0" />
                </div>
                <div>
                  <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Fecha</label>
                  <input className="input" type="date" value={activeItem.form.fecha}
                    onChange={e => updateForm(activeIdx, "fecha", e.target.value)} />
                </div>
              </div>

              <div>
                <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Nota (opcional)</label>
                <input className="input" value={activeItem.form.nota}
                  onChange={e => updateForm(activeIdx, "nota", e.target.value)} placeholder="..." />
              </div>

              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn btn-primary" onClick={() => saveItem(activeIdx)}
                  disabled={!activeItem.form.vendedoraId || !activeItem.form.total || activeItem.status === "processing"}
                  style={{ flex: 1, padding: 14, fontSize: 15, opacity: (!activeItem.form.vendedoraId || !activeItem.form.total || activeItem.status === "processing") ? 0.5 : 1 }}>
                  Guardar venta {doneCount > 1 ? `(quedan ${doneCount})` : ""}
                </button>
                <button onClick={() => removeItem(activeIdx)}
                  style={{ background: "#FFF8F5", border: "1px solid #2A2A3E", borderRadius: 8, color: "#F87171", padding: "14px 16px", cursor: "pointer", fontSize: 20 }}>🗑</button>
              </div>
            </div>
          )}
        </div>
      )}

      {queue.length === 0 && savedCount === 0 && (
        <div className="card" style={{ textAlign: "center", padding: 40, color: "#7A5848" }}>
          <p style={{ fontSize: 36, marginBottom: 10 }}>📋</p>
          <p style={{ fontSize: 14 }}>Subí fotos o usá carga manual</p>
          <p style={{ fontSize: 12, marginTop: 6 }}>La IA leerá los datos automáticamente</p>
        </div>
      )}

      {manualOpen && (
        <div className="card" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <p style={{ fontSize: 13, fontWeight: 700, color: "#2C1A14" }}>✏️ Carga manual</p>
            <button onClick={() => setManualOpen(false)} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#8B6558" }}>×</button>
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Cliente</label>
            <input className="input" value={manualForm.cliente} onChange={e => setManualForm(f => ({ ...f, cliente: e.target.value }))} placeholder="Nombre del cliente" />
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Vendedora</label>
            <select className="input" value={manualForm.vendedoraId} onChange={e => setManualForm(f => ({ ...f, vendedoraId: e.target.value }))}>
              <option value="">Seleccionar...</option>
              {vendedoras.map(v => <option key={v.id} value={v.id}>{v.nombre} ({v.comision}%)</option>)}
            </select>
          </div>
          <div className="grid2">
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Total venta</label>
              <input className="input" type="number" value={manualForm.total} onChange={e => setManualForm(f => ({ ...f, total: e.target.value }))} placeholder="0" />
            </div>
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Fecha</label>
              <input className="input" type="date" value={manualForm.fecha} onChange={e => setManualForm(f => ({ ...f, fecha: e.target.value }))} />
            </div>
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Nota (opcional)</label>
            <input className="input" value={manualForm.nota} onChange={e => setManualForm(f => ({ ...f, nota: e.target.value }))} placeholder="..." />
          </div>
          <button className="btn btn-primary" onClick={async () => {
            if (!manualForm.vendedoraId || !manualForm.total) return;
            await addVenta({ ...manualForm, vendedoraId: Number(manualForm.vendedoraId), total: Number(manualForm.total) });
            setManualSaved(true);
            setManualForm({ cliente: "", vendedoraId: "", total: "", fecha: new Date().toISOString().split("T")[0], nota: "" });
            setTimeout(() => { setManualSaved(false); setManualOpen(false); }, 2000);
          }} disabled={!manualForm.vendedoraId || !manualForm.total} style={{ padding: 14, fontSize: 15, opacity: (!manualForm.vendedoraId || !manualForm.total) ? 0.5 : 1 }}>
            Guardar venta
          </button>
          {manualSaved && <p style={{ textAlign: "center", color: "#10B981", fontWeight: 600 }}>✓ Guardada</p>}
        </div>
      )}
    </div>
  );
}

// ─── COMISIONES ───────────────────────────────────────────────────────────────
function Comisiones({ ventas, vendedoras, pagos, addPago, currentMes, getComisionMes, getPagadoMes, fmtPeso, MESES, getMonthKey }) {
  const [mesSel, setMesSel] = useState(currentMes);
  const [pagandoId, setPagandoId] = useState(null);
  const [montoPago, setMontoPago] = useState("");

  const meses = [...new Set(ventas.map(v => getMonthKey(v.fecha)))].sort().reverse();
  if (!meses.includes(currentMes)) meses.unshift(currentMes);

  const handlePago = async (vendedoraId) => {
    if (!montoPago) return;
    await addPago(vendedoraId, montoPago, mesSel);
    setMontoPago("");
    setPagandoId(null);
  };

  const formatMes = (key) => {
    const [y, m] = key.split("-");
    return `${MESES[parseInt(m) - 1]} ${y}`;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Mes</label>
        <select className="input" value={mesSel} onChange={e => setMesSel(e.target.value)} style={{ maxWidth: 220 }}>
          {meses.map(m => <option key={m} value={m}>{formatMes(m)}</option>)}
        </select>
      </div>

      {vendedoras.map(v => {
        const comision = getComisionMes(v.id, mesSel);
        const pagado = getPagadoMes(v.id, mesSel);
        const deuda = comision - pagado;
        const pagosMes = pagos.filter(p => p.vendedoraId === v.id && p.mes === mesSel);
        const ventasMes = ventas.filter(vt => vt.vendedoraId === v.id && getMonthKey(vt.fecha) === mesSel);
        const totalVentas = ventasMes.reduce((s, vt) => s + Number(vt.total || 0), 0);

        return (
          <div key={v.id} className="card" style={{ borderLeft: `3px solid ${v.color}` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: v.color + "22", border: `2px solid ${v.color}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: v.color }}>{v.nombre[0]}</span>
                </div>
                <div>
                  <p style={{ fontWeight: 700, fontSize: 15 }}>{v.nombre}</p>
                  <p style={{ fontSize: 11, color: "#6B4A3E" }}>{v.comision}% de comisión</p>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <p style={{ fontSize: 20, fontWeight: 700, color: deuda > 0 ? "#F87171" : "#10B981" }}>{fmtPeso(Math.abs(deuda))}</p>
                <p style={{ fontSize: 11, color: "#6B4A3E" }}>{deuda > 0 ? "a pagar" : "al día"}</p>
              </div>
            </div>

            <div style={{ background: "#FFFFFF", borderRadius: 8, padding: 12, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span style={{ color: "#5A3828" }}>Total ventas</span>
                <span>{fmtPeso(totalVentas)} ({ventasMes.length} ops)</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span style={{ color: "#5A3828" }}>Comisión ({v.comision}%)</span>
                <span style={{ color: "#A85D43", fontWeight: 600 }}>{fmtPeso(comision)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                <span style={{ color: "#5A3828" }}>Ya pagado</span>
                <span style={{ color: "#10B981" }}>{fmtPeso(pagado)}</span>
              </div>
            </div>

            {pagosMes.length > 0 && (
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#7A5848", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Pagos registrados</p>
                {pagosMes.map(p => (
                  <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#5A3828", padding: "4px 0" }}>
                    <span>{p.fecha}</span>
                    <span style={{ color: "#10B981" }}>+{fmtPeso(p.monto)}</span>
                  </div>
                ))}
              </div>
            )}

            {pagandoId === v.id ? (
              <div style={{ display: "flex", gap: 8 }}>
                <input className="input" type="number" value={montoPago} onChange={e => setMontoPago(e.target.value)} placeholder="Monto pagado" style={{ flex: 1 }} autoFocus />
                <button className="btn btn-primary btn-sm" onClick={() => handlePago(v.id)}>✓</button>
                <button onClick={() => setPagandoId(null)} style={{ background: "#FFF8F5", border: "1px solid #2A2A3E", borderRadius: 8, color: "#5A3828", padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>✕</button>
              </div>
            ) : (
              <button className="btn btn-primary btn-sm" onClick={() => { setPagandoId(v.id); setMontoPago(""); }} style={{ width: "100%" }}>
                Registrar pago de comisión
              </button>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── HISTORIAL ────────────────────────────────────────────────────────────────
function Historial({ ventas, vendedoras, fmtPeso, MESES, getMonthKey }) {
  const [filtroVendedora, setFiltroVendedora] = useState("all");
  const [filtroMes, setFiltroMes] = useState("all");

  const meses = [...new Set(ventas.map(v => getMonthKey(v.fecha)))].sort().reverse();

  const filtradas = ventas.filter(v => {
    if (filtroVendedora !== "all" && String(v.vendedora_id || v.vendedoraId) !== filtroVendedora) return false;
    if (filtroMes !== "all" && getMonthKey(v.fecha) !== filtroMes) return false;
    return true;
  });

  const formatMes = (key) => {
    const [y, m] = key.split("-");
    return `${MESES[parseInt(m) - 1]} ${y}`;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="grid2">
        <div>
          <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Vendedora</label>
          <select className="input" value={filtroVendedora} onChange={e => setFiltroVendedora(e.target.value)}>
            <option value="all">Todas</option>
            {vendedoras.map(v => <option key={v.id} value={v.id}>{v.nombre}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize: 12, color: "#5A3828", marginBottom: 6, display: "block" }}>Mes</label>
          <select className="input" value={filtroMes} onChange={e => setFiltroMes(e.target.value)}>
            <option value="all">Todos</option>
            {meses.map(m => <option key={m} value={m}>{formatMes(m)}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "12px 16px", borderBottom: "1px solid #1E1E2E", display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontSize: 11, color: "#6B4A3E", textTransform: "uppercase", letterSpacing: "0.1em" }}>{filtradas.length} ventas</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: "#A85D43" }}>{fmtPeso(filtradas.reduce((s, v) => s + Number(v.total || 0), 0))}</span>
        </div>
        {filtradas.length === 0 && <p style={{ padding: 24, textAlign: "center", color: "#7A5848", fontSize: 13 }}>Sin ventas en este período</p>}
        {filtradas.map(v => {
          const vend = vendedoras.find(vv => vv.id === (v.vendedora_id || v.vendedoraId));
          return (
            <div key={v.id} style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: "1px solid #1A1A25", gap: 12 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: vend?.color || "#444", flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 14, fontWeight: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{v.cliente || "Sin nombre"}</p>
                <p style={{ fontSize: 11, color: "#6B4A3E", marginTop: 2 }}>{v.fecha} · {vend?.nombre}</p>
                {v.nota && <p style={{ fontSize: 11, color: "#7A5848", marginTop: 1 }}>{v.nota}</p>}
              </div>
              <span style={{ fontSize: 15, fontWeight: 700, flexShrink: 0 }}>{fmtPeso(v.total)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── COMPARAR ────────────────────────────────────────────────────────────────
function Comparar({ ventas, vendedoras, fmtPeso, MESES, getMonthKey }) {
  const [modo, setModo] = React.useState("mes");
  const [filtroVendedora, setFiltroVendedora] = React.useState("all");

  // Get all available years and months
  const allMonths = [...new Set(ventas.map(v => getMonthKey(v.fecha)))].sort();
  const allYears = [...new Set(allMonths.map(m => m.split("-")[0]))].sort();

  // Mes vs Mes state
  const [mes1, setMes1] = React.useState(allMonths[allMonths.length - 1] || "");
  const [mes2, setMes2] = React.useState(allMonths[allMonths.length - 2] || "");

  // Año vs Año state
  const [anio1, setAnio1] = React.useState(allYears[allYears.length - 1] || "");
  const [anio2, setAnio2] = React.useState(allYears[allYears.length - 2] || allYears[allYears.length - 1] || "");

  // Rango vs Rango state
  const [rangoA1, setRangoA1] = React.useState(allMonths[0] || "");
  const [rangoA2, setRangoA2] = React.useState(allMonths[Math.floor(allMonths.length/2) - 1] || "");
  const [rangoB1, setRangoB1] = React.useState(allMonths[Math.floor(allMonths.length/2)] || "");
  const [rangoB2, setRangoB2] = React.useState(allMonths[allMonths.length - 1] || "");

  const getTotal = (ventasFiltradas) => ventasFiltradas.reduce((s, v) => s + Number(v.total || 0), 0);

  const filtrarVentas = (v) => filtroVendedora === "all" || String(v.vendedora_id || v.vendedoraId) === filtroVendedora;

  const ventasMes = (mesKey) => ventas.filter(v => getMonthKey(v.fecha) === mesKey && filtrarVentas(v));
  const ventasAnio = (anio) => ventas.filter(v => v.fecha?.startsWith(anio) && filtrarVentas(v));
  const ventasRango = (desde, hasta) => ventas.filter(v => {
    const m = getMonthKey(v.fecha);
    return m >= desde && m <= hasta && filtrarVentas(v);
  });

  const formatMes = (key) => {
    if (!key) return "-";
    const [y, m] = key.split("-");
    return `${MESES[parseInt(m) - 1]} ${y}`;
  };

  const pct = (a, b) => {
    if (!b) return null;
    const diff = ((a - b) / b) * 100;
    return diff;
  };

  const PctBadge = ({ a, b }) => {
    const d = pct(a, b);
    if (d === null) return null;
    const color = d >= 0 ? "#10B981" : "#F87171";
    const sign = d >= 0 ? "+" : "";
    return <span style={{ fontSize: 12, color, fontWeight: 700, marginLeft: 8 }}>{sign}{d.toFixed(1)}%</span>;
  };

  const CompareBlock = ({ labelA, labelB, ventasA, ventasB }) => {
    const totalA = getTotal(ventasA);
    const totalB = getTotal(ventasB);
    const vendsA = vendedoras.map(v => ({
      ...v,
      totalA: getTotal(ventasA.filter(vt => (vt.vendedora_id || vt.vendedoraId) === v.id)),
      totalB: getTotal(ventasB.filter(vt => (vt.vendedora_id || vt.vendedoraId) === v.id)),
    }));

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {/* Totales */}
        <div className="card" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={{ textAlign: "center" }}>
            <p style={{ fontSize: 11, color: "#6B4A3E", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>{labelA}</p>
            <p style={{ fontSize: 28, fontWeight: 700, color: "#2C1A14" }}>{fmtPeso(totalA)}</p>
            <p style={{ fontSize: 12, color: "#8B6558" }}>{ventasA.length} ventas</p>
          </div>
          <div style={{ textAlign: "center" }}>
            <p style={{ fontSize: 11, color: "#6B4A3E", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>{labelB}</p>
            <p style={{ fontSize: 28, fontWeight: 700, color: "#2C1A14" }}>{fmtPeso(totalB)}</p>
            <p style={{ fontSize: 12, color: "#8B6558" }}>{ventasB.length} ventas</p>
          </div>
        </div>

        {/* Diferencia */}
        <div className="card" style={{ textAlign: "center" }}>
          <p style={{ fontSize: 11, color: "#6B4A3E", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Diferencia</p>
          <p style={{ fontSize: 22, fontWeight: 700, color: totalA >= totalB ? "#10B981" : "#F87171" }}>
            {totalA >= totalB ? "+" : ""}{fmtPeso(totalA - totalB)}
            <PctBadge a={totalA} b={totalB} />
          </p>
        </div>

        {/* Por vendedora */}
        {filtroVendedora === "all" && (
          <div className="card">
            <p style={{ fontSize: 11, color: "#6B4A3E", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Por vendedora</p>
            {vendsA.map(v => (
              <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #E8C4B0" }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: v.color, flexShrink: 0 }} />
                <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{v.nombre}</span>
                <span style={{ fontSize: 13, color: "#6B4A3E", minWidth: 90, textAlign: "right" }}>{fmtPeso(v.totalA)}</span>
                <span style={{ fontSize: 12, color: "#9A7570", minWidth: 20 }}>vs</span>
                <span style={{ fontSize: 13, color: "#6B4A3E", minWidth: 90, textAlign: "right" }}>{fmtPeso(v.totalB)}</span>
                <PctBadge a={v.totalA} b={v.totalB} />
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* Modo selector */}
      <div className="card" style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {[["mes","Mes vs Mes"],["anio","Año vs Año"],["rango","Rango vs Rango"]].map(([k,l]) => (
          <button key={k} onClick={() => setModo(k)} style={{
            padding: "8px 16px", borderRadius: 8, border: "none", cursor: "pointer",
            fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
            background: modo === k ? "#A85D43" : "#FFF8F5",
            color: modo === k ? "#FFF" : "#6B4A3E",
            border: `1px solid ${modo === k ? "#A85D43" : "#D4A090"}`
          }}>{l}</button>
        ))}
      </div>

      {/* Filtro vendedora */}
      <div>
        <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Vendedora</label>
        <select className="input" value={filtroVendedora} onChange={e => setFiltroVendedora(e.target.value)} style={{ maxWidth: 240 }}>
          <option value="all">Todas</option>
          {vendedoras.map(v => <option key={v.id} value={String(v.id)}>{v.nombre}</option>)}
        </select>
      </div>

      {/* Mes vs Mes */}
      {modo === "mes" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div className="grid2">
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Período A</label>
              <div style={{ display: "flex", gap: 8 }}>
                <select className="input" value={mes1.split("-")[0]} onChange={e => {
                  const y = e.target.value;
                  const m = mes1.split("-")[1];
                  const newKey = `${y}-${m}`;
                  setMes1(allMonths.includes(newKey) ? newKey : allMonths.find(k => k.startsWith(y)) || mes1);
                }}>
                  {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                <select className="input" value={mes1.split("-")[1]} onChange={e => {
                  const m = e.target.value;
                  const y = mes1.split("-")[0];
                  const newKey = `${y}-${m}`;
                  setMes1(allMonths.includes(newKey) ? newKey : mes1);
                }}>
                  {MESES.map((nombre, i) => {
                    const m = String(i+1).padStart(2,"0");
                    const y = mes1.split("-")[0];
                    const exists = allMonths.includes(`${y}-${m}`);
                    return exists ? <option key={m} value={m}>{nombre}</option> : null;
                  })}
                </select>
              </div>
            </div>
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Período B</label>
              <div style={{ display: "flex", gap: 8 }}>
                <select className="input" value={mes2.split("-")[0]} onChange={e => {
                  const y = e.target.value;
                  const m = mes2.split("-")[1];
                  const newKey = `${y}-${m}`;
                  setMes2(allMonths.includes(newKey) ? newKey : allMonths.find(k => k.startsWith(y)) || mes2);
                }}>
                  {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                <select className="input" value={mes2.split("-")[1]} onChange={e => {
                  const m = e.target.value;
                  const y = mes2.split("-")[0];
                  const newKey = `${y}-${m}`;
                  setMes2(allMonths.includes(newKey) ? newKey : mes2);
                }}>
                  {MESES.map((nombre, i) => {
                    const m = String(i+1).padStart(2,"0");
                    const y = mes2.split("-")[0];
                    const exists = allMonths.includes(`${y}-${m}`);
                    return exists ? <option key={m} value={m}>{nombre}</option> : null;
                  })}
                </select>
              </div>
            </div>
          </div>
          <CompareBlock labelA={formatMes(mes1)} labelB={formatMes(mes2)} ventasA={ventasMes(mes1)} ventasB={ventasMes(mes2)} />
        </div>
      )}

      {/* Año vs Año */}
      {modo === "anio" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div className="grid2">
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Año A</label>
              <select className="input" value={anio1} onChange={e => setAnio1(e.target.value)}>
                {allYears.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 12, color: "#6B4A3E", marginBottom: 6, display: "block" }}>Año B</label>
              <select className="input" value={anio2} onChange={e => setAnio2(e.target.value)}>
                {allYears.map(y => <option key={y} value={y}>{y}</option>)}
              </select>
            </div>
          </div>
          <CompareBlock labelA={anio1} labelB={anio2} ventasA={ventasAnio(anio1)} ventasB={ventasAnio(anio2)} />
        </div>
      )}

      {/* Rango vs Rango */}
      {modo === "rango" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div className="card" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: "#2C1A14" }}>Período A</p>
            <div className="grid2">
              <div>
                <label style={{ fontSize: 11, color: "#6B4A3E", marginBottom: 4, display: "block" }}>Desde</label>
                <div style={{ display: "flex", gap: 8 }}>
                  <select className="input" value={rangoA1.split("-")[0]} onChange={e => { const y=e.target.value; const nk=`${y}-${rangoA1.split("-")[1]}`; setRangoA1(allMonths.includes(nk)?nk:allMonths.find(k=>k.startsWith(y))||rangoA1); }}>
                    {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                  </select>
                  <select className="input" value={rangoA1.split("-")[1]} onChange={e => { const m=e.target.value; const y=rangoA1.split("-")[0]; const nk=`${y}-${m}`; setRangoA1(allMonths.includes(nk)?nk:rangoA1); }}>
                    {MESES.map((nombre,i) => { const m=String(i+1).padStart(2,"0"); return allMonths.includes(`${rangoA1.split("-")[0]}-${m}`) ? <option key={m} value={m}>{nombre}</option> : null; })}
                  </select>
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: "#6B4A3E", marginBottom: 4, display: "block" }}>Hasta</label>
                <div style={{ display: "flex", gap: 8 }}>
                  <select className="input" value={rangoA2.split("-")[0]} onChange={e => { const y=e.target.value; const nk=`${y}-${rangoA2.split("-")[1]}`; setRangoA2(allMonths.includes(nk)?nk:allMonths.find(k=>k.startsWith(y))||rangoA2); }}>
                    {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                  </select>
                  <select className="input" value={rangoA2.split("-")[1]} onChange={e => { const m=e.target.value; const y=rangoA2.split("-")[0]; const nk=`${y}-${m}`; setRangoA2(allMonths.includes(nk)?nk:rangoA2); }}>
                    {MESES.map((nombre,i) => { const m=String(i+1).padStart(2,"0"); return allMonths.includes(`${rangoA2.split("-")[0]}-${m}`) ? <option key={m} value={m}>{nombre}</option> : null; })}
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div className="card" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <p style={{ fontSize: 12, fontWeight: 600, color: "#2C1A14" }}>Período B</p>
            <div className="grid2">
              <div>
                <label style={{ fontSize: 11, color: "#6B4A3E", marginBottom: 4, display: "block" }}>Desde</label>
                <div style={{ display: "flex", gap: 8 }}>
                  <select className="input" value={rangoB1.split("-")[0]} onChange={e => { const y=e.target.value; const nk=`${y}-${rangoB1.split("-")[1]}`; setRangoB1(allMonths.includes(nk)?nk:allMonths.find(k=>k.startsWith(y))||rangoB1); }}>
                    {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                  </select>
                  <select className="input" value={rangoB1.split("-")[1]} onChange={e => { const m=e.target.value; const y=rangoB1.split("-")[0]; const nk=`${y}-${m}`; setRangoB1(allMonths.includes(nk)?nk:rangoB1); }}>
                    {MESES.map((nombre,i) => { const m=String(i+1).padStart(2,"0"); return allMonths.includes(`${rangoB1.split("-")[0]}-${m}`) ? <option key={m} value={m}>{nombre}</option> : null; })}
                  </select>
                </div>
              </div>
              <div>
                <label style={{ fontSize: 11, color: "#6B4A3E", marginBottom: 4, display: "block" }}>Hasta</label>
                <div style={{ display: "flex", gap: 8 }}>
                  <select className="input" value={rangoB2.split("-")[0]} onChange={e => { const y=e.target.value; const nk=`${y}-${rangoB2.split("-")[1]}`; setRangoB2(allMonths.includes(nk)?nk:allMonths.find(k=>k.startsWith(y))||rangoB2); }}>
                    {allYears.map(y => <option key={y} value={y}>{y}</option>)}
                  </select>
                  <select className="input" value={rangoB2.split("-")[1]} onChange={e => { const m=e.target.value; const y=rangoB2.split("-")[0]; const nk=`${y}-${m}`; setRangoB2(allMonths.includes(nk)?nk:rangoB2); }}>

            {allMonths.length === 0 && (

  );
}

        {vendedoras.map(v => (
          <div key={v.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: "1px solid #1E1E2E" }}>
            <div style={{ width: 12, height: 12, borderRadius: "50%", background: v.color, flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 14 }}>{v.nombre}</span>
            {editId === v.id ? (
              <>
                <input className="input" type="number" value={editComision} onChange={e => setEditComision(e.target.value)} style={{ width: 70 }} />
                <span style={{ fontSize: 12, color: "#5A3828" }}>%</span>
                <button className="btn btn-primary btn-sm" onClick={() => { setVendedoras(vs => vs.map(vv => vv.id === v.id ? { ...vv, comision: Number(editComision) } : vv)); setEditId(null); }}>✓</button>
              </>
            ) : (
              <>
                <span style={{ fontSize: 13, color: "#A85D43" }}>{v.comision}%</span>
                <button onClick={() => { setEditId(v.id); setEditComision(String(v.comision)); }} style={{ background: "none", border: "1px solid #2A2A3E", borderRadius: 6, color: "#5A3828", padding: "4px 10px", cursor: "pointer", fontSize: 12 }}>Editar</button>
              </>
            )}
          </div>
        ))}
        <div style={{ display: "flex", gap: 8, marginTop: 16, flexWrap: "wrap" }}>
          <input className="input" value={nueva.nombre} onChange={e => setNueva(n => ({ ...n, nombre: e.target.value }))} placeholder="Nombre" style={{ flex: 1, minWidth: 100 }} />
          <input className="input" type="number" value={nueva.comision} onChange={e => setNueva(n => ({ ...n, comision: e.target.value }))} placeholder="%" style={{ width: 70 }} />
          <input type="color" value={nueva.color} onChange={e => setNueva(n => ({ ...n, color: e.target.value }))} style={{ width: 40, height: 40, border: "none", borderRadius: 8, cursor: "pointer", background: "none" }} />
          <button className="btn btn-primary btn-sm" onClick={addVendedora}>+ Agregar</button>
        </div>
      </div>

      <div className="card">
        <p style={{ fontSize: 11, color: "#6B4A3E", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16 }}>Clientes vinculados ({clientesArr.length})</p>
        {clientesArr.length === 0 && <p style={{ fontSize: 13, color: "#7A5848" }}>Se van registrando automáticamente al cargar ventas</p>}
        <div style={{ maxHeight: 220, overflowY: "auto", display: "flex", flexDirection: "column", gap: 4 }}>
          {clientesArr.map(({ nombre, vendedoraId }) => {
            const v = vendedoras.find(vv => vv.id === vendedoraId);
            return (
              <div key={nombre} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, padding: "4px 0", borderBottom: "1px solid #1A1A25" }}>
                <span style={{ textTransform: "capitalize" }}>{nombre}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: v?.color || "#5A3828", fontSize: 12 }}>{v?.nombre || "?"}</span>
                  <button onClick={() => setClientes(c => { const nc = { ...c }; delete nc[nombre]; return nc; })} style={{ background: "none", border: "none", color: "#F87171", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{ borderColor: "#F8717133" }}>
        <p style={{ fontSize: 11, color: "#F87171", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>Zona peligrosa</p>
        <button onClick={() => { if (window.confirm("¿Borrar TODOS los datos?")) { setVentas([]); setPagos([]); setClientes({}); } }}
          style={{ background: "#F8717122", border: "1px solid #F87171", borderRadius: 8, color: "#F87171", padding: "8px 16px", cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans',sans-serif" }}>
          Borrar todos los datos
        </button>
      </div>
    </div>
  );
}


function LoginScreen({ onLogin }) {
  const rememberedUser = localStorage.getItem("cv_remembered_user") || "";
  const [user, setUser] = React.useState(rememberedUser);
  const [pass, setPass] = React.useState("");
  const [remember, setRemember] = React.useState(!!rememberedUser);
  const [error, setError] = React.useState(false);

  const handleLogin = () => {
    if (user.toLowerCase() === "criterio" && pass.toLowerCase() === "comida") {
      if (remember) { localStorage.setItem("cv_remembered_user", user); }
      else { localStorage.removeItem("cv_remembered_user"); }
      onLogin();
    } else {
      setError(true);
      setTimeout(() => setError(false), 2000);
    }
  };

  return (
    <div style={{ minHeight: "100vh", background: "#C87B5F", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif" }}>
      <div style={{ background: "#FFF", borderRadius: 16, padding: 40, width: 320, boxShadow: "0 4px 24px rgba(196,120,90,0.15)", textAlign: "center" }}>
        <div style={{ fontFamily: "Georgia, serif", fontSize: 36, fontWeight: 900, color: "#2C1A14", letterSpacing: "-0.02em", marginBottom: 4 }}>CRITERIO</div>
        <p style={{ color: "#8B6558", fontSize: 13, marginBottom: 32, letterSpacing: "0.1em", textTransform: "uppercase" }}>Ventas</p>
        {rememberedUser ? (
          <p style={{ fontSize: 14, color: "#2C1A14", marginBottom: 12, fontWeight: 600 }}>Hola, {rememberedUser} 👋</p>
        ) : (
          <input value={user} onChange={e => setUser(e.target.value)} placeholder="Usuario" style={{ width: "100%", padding: "10px 14px", border: "1px solid #D4A090", borderRadius: 8, fontSize: 14, marginBottom: 12, boxSizing: "border-box", fontFamily: "inherit", outline: "none", background: "#FFF8F5" }} />
        )}
        <input type="password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Contraseña" autoFocus={!!rememberedUser} style={{ width: "100%", padding: "10px 14px", border: "1px solid #D4A090", borderRadius: 8, fontSize: 14, marginBottom: 12, boxSizing: "border-box", fontFamily: "inherit", outline: "none", background: "#FFF8F5" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
          <input type="checkbox" id="rem" checked={remember} onChange={e => setRemember(e.target.checked)} style={{ width: 16, height: 16, cursor: "pointer", accentColor: "#A85D43" }} />
          <label htmlFor="rem" style={{ fontSize: 13, color: "#6B4A3E", cursor: "pointer" }}>Recordar usuario</label>
        </div>
        {error && <p style={{ color: "#E05A3A", fontSize: 13, marginBottom: 12 }}>Contraseña incorrecta</p>}
        <button onClick={handleLogin} style={{ width: "100%", padding: "12px", background: "#A85D43", color: "#FFFFFF", border: "none", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Ingresar</button>
        {rememberedUser && (
          <button onClick={() => { localStorage.removeItem("cv_remembered_user"); window.location.reload(); }} style={{ width: "100%", padding: "8px", background: "none", color: "#8B6558", border: "none", fontSize: 12, cursor: "pointer", fontFamily: "inherit", marginTop: 8 }}>No soy {rememberedUser}</button>
        )}
      </div>
    </div>
  );
}

function Root() {
  const [logged, setLogged] = React.useState(() => sessionStorage.getItem("cv_logged") === "1");
  const handleLogin = () => { sessionStorage.setItem("cv_logged", "1"); setLogged(true); };
  const handleLogout = () => { sessionStorage.removeItem("cv_logged"); setLogged(false); };
  if (!logged) return React.createElement(LoginScreen, { onLogin: handleLogin });
  return React.createElement(App, { onLogout: handleLogout });
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));

  </script>
</body>
